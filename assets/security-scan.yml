name: Security — Scheduled Scans

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - dependencies
          - sast
          - container
          - secrets

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  # ─── Dependency Vulnerability Scan ───────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'dependencies' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --json > npm-audit.json || true

      - name: Parse and report high/critical findings
        run: |
          HIGH_CRITICAL=$(cat npm-audit.json | jq '[.vulnerabilities | to_entries[] | select(.value.severity == "high" or .value.severity == "critical")] | length')
          echo "High/Critical vulnerabilities found: $HIGH_CRITICAL"
          if [ "$HIGH_CRITICAL" -gt 0 ]; then
            echo "::warning::$HIGH_CRITICAL high/critical npm vulnerabilities found. Review required."
          fi

      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=medium --sarif-file-output=snyk-deps.sarif

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

  # ─── SAST Scan ───────────────────────────────────────────────────────────
  sast-scan:
    name: SAST — Static Application Security Testing
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'sast' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript, javascript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:typescript"
          output: codeql-results.sarif

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/secrets
            p/jwt
            p/sql-injection
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─── Container Image Scan ────────────────────────────────────────────────
  container-scan:
    name: Container Image Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'container' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest production image
        run: docker pull localpulse/payment-gateway:latest

      - name: Trivy scan — OS packages
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localpulse/payment-gateway:latest
          format: sarif
          output: trivy-os.sarif
          vuln-type: os
          severity: MEDIUM,HIGH,CRITICAL

      - name: Trivy scan — application libraries
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localpulse/payment-gateway:latest
          format: sarif
          output: trivy-lib.sarif
          vuln-type: library
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-os.sarif
          category: trivy-container

      - name: Grype image scan
        uses: anchore/scan-action@v3
        with:
          image: localpulse/payment-gateway:latest
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif
          category: grype-container

  # ─── Secrets Scan ────────────────────────────────────────────────────────
  secrets-scan:
    name: Historical Secrets Scan
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'secrets' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for comprehensive scan

      - name: Gitleaks full history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: TruffleHog full history scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ─── License Compliance ──────────────────────────────────────────────────
  license-scan:
    name: License Compliance Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --onlyAllow \
            "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;Unlicense;0BSD" \
            --excludePrivatePackages \
            --json > license-report.json

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ github.run_id }}
          path: license-report.json
          retention-days: 90

  # ─── Alert on Critical Findings ──────────────────────────────────────────
  alert-on-findings:
    name: Alert Security Team
    runs-on: ubuntu-latest
    needs: [dependency-scan, sast-scan, container-scan, secrets-scan]
    if: failure()
    steps:
      - name: Create security finding issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] Scheduled scan findings — ${date}`,
              body: `## Security Scan Alert\n\nThe scheduled security scan at ${date} detected findings that require review.\n\n**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Action required:** Security team review within 24 hours.\n\n/cc @localpulse-pro/security-lead`,
              labels: ['security', 'automated', 'triage-needed'],
              assignees: ['security-lead'],
            });

      - name: Notify security team via email
        run: |
          echo "Security findings detected — notification sent to security@localpulse.pro"
          # Email notification configured via external webhook
        env:
          SECURITY_WEBHOOK_URL: ${{ secrets.SECURITY_ALERT_WEBHOOK }}
